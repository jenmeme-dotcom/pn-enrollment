services:
  - type: web
    name: broward-miami-sis-lms
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    disk:
      name: bmhi-sis-lms-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4321
      - key: DATABASE_FILE
        value: /data/bmhi.sqlite
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: INSTITUTE_NAME
        value: Broward-Miami Health Institute
      - key: INSTITUTE_ADDRESS
        value: 6320 Miramar Pkwy Suite I, Miramar, FL 33023
      - key: INSTITUTE_WEBSITE
        value: https://www.browardmiamihi.com
      - key: PUBLIC_APP_URL
        value: https://bmhi-student-portal.onrender.com
      - key: EMAIL_DELIVERY_ENABLED
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GHL_WEBHOOK_SECRET
        generateValue: true
